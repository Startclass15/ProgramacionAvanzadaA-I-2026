<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Realtime Pro</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f3f4f6;
            --bg-chat: #ffffff;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor Principal */
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: var(--bg-chat);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* Área de Mensajes */
        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9fafb;
        }

        .message {
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .received {
            background: #e5e7eb;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* Inputs y Controles */
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        #mensaje { flex: 1; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        /* Pantalla de login */
        #login-overlay {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="login-overlay">
        <h3>Bienvenido al Chat</h3>
        <input type="text" id="nombre" placeholder="Tu apodo...">
        <button onclick="guardarNombre()">Entrar al chat</button>
    </div>

    <div class="chat-header">Sala de Chat Pro</div>
    
    <div id="chat">
        </div>

    <div class="input-area">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje...">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    var socket = io();
    var nombreUsuario = "";

    function guardarNombre() {
        const inputNombre = document.getElementById("nombre");
        if(inputNombre.value.trim() !== "") {
            nombreUsuario = inputNombre.value;
            document.getElementById("login-overlay").style.display = "none";
        }
    }

    function enviar() {
        const inputMsg = document.getElementById("mensaje");
        const msg = inputMsg.value;
        
        if(msg.trim() !== "" && nombreUsuario !== "") {
            // Enviamos un objeto para mejor manejo de datos
            socket.emit("message", {
                user: nombreUsuario,
                text: msg
            });
            inputMsg.value = "";
        }
    }

    socket.on("message", function(data) {
        var chat = document.getElementById("chat");
        var claseMensaje = (data.user === nombreUsuario) ? "sent" : "received";
        
        chat.innerHTML += `
            <div class="message ${claseMensaje}">
                <small><strong>${data.user}</strong></small><br>
                ${data.text}
            </div>
        `;
        
        // Auto-scroll al final
        chat.scrollTop = chat.scrollHeight;
    });

    // Enviar con la tecla Enter
    document.getElementById("mensaje").addEventListener("keypress", function(e) {
        if (e.key === "Enter") enviar();
    });
</script>

</body>
</html>
